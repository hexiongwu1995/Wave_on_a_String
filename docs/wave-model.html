<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弦上波的数学模型 — 在线阅读</title>
    <link rel="icon" type="image/svg+xml" href="guitar.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'KaiTi', 'Georgia', serif;
            background: #f0f1f5;
            color: #1a1a2e;
            min-height: 100vh;
        }

        /* ===== 顶部导航 ===== */
        .top-nav {
            background: #1a1a2e;
            color: #e8e8e8;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
        }

        .top-nav .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
        }

        .top-nav .nav-brand {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-nav .nav-brand img {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
        }

        .top-nav .nav-links {
            display: flex;
            gap: 6px;
            list-style: none;
        }

        .top-nav .nav-links a {
            color: #b0b0c0;
            text-decoration: none;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            padding: 8px 14px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .top-nav .nav-links a:hover,
        .top-nav .nav-links a.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
        }

        /* ===== 文档头部 ===== */
        .doc-header {
            background: white;
            border-bottom: 1px solid #e2e6ea;
            padding: 20px 24px;
        }

        .doc-header .doc-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .doc-header .doc-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .doc-header .doc-meta {
            font-size: 13px;
            color: #6b7280;
            font-family: 'Inter', sans-serif;
        }

        .doc-header .doc-actions {
            display: flex;
            gap: 8px;
        }

        .doc-header .doc-actions a {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
        }

        .doc-header .btn-download {
            background: #1a1a2e;
            color: white;
        }

        .doc-header .btn-download:hover {
            background: #0f3460;
        }

        .doc-header .btn-back {
            background: #f0f1f5;
            color: #1a1a2e;
        }

        .doc-header .btn-back:hover {
            background: #e2e6ea;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            background: #f8f9fb;
            border-bottom: 1px solid #e2e6ea;
            padding: 10px 24px;
        }

        .toolbar .toolbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .toolbar .page-info {
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #4b5563;
        }

        .toolbar .page-info input {
            width: 50px;
            padding: 4px 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .toolbar .page-info button {
            padding: 4px 12px;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            transition: background 0.2s;
        }

        .toolbar .page-info button:hover {
            background: #e2e6ea;
        }

        .toolbar .zoom-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar .zoom-controls button {
            padding: 4px 10px;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toolbar .zoom-controls button:hover {
            background: #e2e6ea;
        }

        .toolbar .zoom-controls span {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #4b5563;
            min-width: 40px;
            text-align: center;
        }

        /* ===== PDF 查看器 ===== */
        #viewer-container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 24px;
        }

        #pdf-viewer {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e6ea;
            padding: 20px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #pdf-viewer .pdf-page {
            margin-bottom: 16px;
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.10);
            border-radius: 2px;
            max-width: 100%;
        }

        #pdf-viewer .pdf-page canvas {
            display: block;
            max-width: 100%;
            height: auto !important;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #6b7280;
            font-family: 'Inter', sans-serif;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e6ea;
            border-top: 3px solid #1a1a2e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            text-align: center;
            padding: 80px 20px;
            color: #dc2626;
            font-family: 'Inter', sans-serif;
        }

        /* ===== 页脚 ===== */
        footer {
            text-align: center;
            padding: 24px;
            color: #8a8aa0;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .top-nav .nav-inner {
                padding: 0 12px;
            }

            .top-nav .nav-brand {
                font-size: 14px;
            }

            .top-nav .nav-links a {
                font-size: 12px;
                padding: 6px 10px;
            }

            .doc-header {
                padding: 16px;
            }

            .doc-header .doc-title {
                font-size: 15px;
            }

            #viewer-container {
                padding: 0 12px;
                margin: 16px auto;
            }

            #pdf-viewer {
                padding: 12px;
            }

            .toolbar {
                padding: 8px 12px;
            }
        }
    </style>
</head>

<body>

    <!-- ===== 导航 ===== -->
    <nav class="top-nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">
                <img src="guitar.svg" alt="logo"> 弦振动理论
            </a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="Visualization_of_wave_on_a_string.html">交互模拟</a></li>
            </ul>
        </div>
    </nav>

    <!-- ===== 文档头 ===== -->
    <div class="doc-header">
        <div class="doc-inner">
            <div>
                <div class="doc-title">🏛️ 弦上波的数学模型</div>
                <div class="doc-meta">何雄武 · 2026 年 5 月 · 含 CeTZ 矢量插图</div>
            </div>
            <div class="doc-actions">
                <a href="index.html" class="btn-back">← 返回首页</a>
                <a href="wave-model.pdf" class="btn-download" target="_blank">⬇ 下载 PDF</a>
            </div>
        </div>
    </div>

    <!-- ===== 工具栏 ===== -->
    <div class="toolbar">
        <div class="toolbar-inner">
            <div class="page-info">
                第 <input type="number" id="page-input" value="1" min="1"> 页
                <span id="page-total">/ ?</span>
                <button id="go-page-btn">跳转</button>
            </div>
            <div class="zoom-controls">
                <button id="zoom-out">−</button>
                <span id="zoom-level">100%</span>
                <button id="zoom-in">+</button>
            </div>
        </div>
    </div>

    <!-- ===== PDF 查看器 ===== -->
    <div id="viewer-container">
        <div id="pdf-viewer">
            <div class="loading" id="loading-indicator">
                <div class="spinner"></div>
                <p>正在加载文档…</p>
            </div>
        </div>
    </div>

    <footer>
        弦上波的数学模型 · 何雄武 · 2026
    </footer>

    <script>
        const pdfUrl = 'wave-model.pdf';
        let pdfDoc = null;
        let currentPage = 1;
        let zoomScale = 1.0;
        const viewer = document.getElementById('pdf-viewer');
        const loadingEl = document.getElementById('loading-indicator');

        // PDF.js 配置
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        function renderPage(pageNum) {
            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: zoomScale });

                // 移除该页已有的 canvas（如果有）
                const existing = document.querySelector(`.pdf-page[data-page="${pageNum}"]`);
                if (existing) existing.remove();

                const container = document.createElement('div');
                container.className = 'pdf-page';
                container.dataset.page = pageNum;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                container.appendChild(canvas);
                // 在当前页位置插入
                const pages = viewer.querySelectorAll('.pdf-page');
                let inserted = false;
                for (const p of pages) {
                    const n = parseInt(p.dataset.page);
                    if (n > pageNum) {
                        viewer.insertBefore(container, p);
                        inserted = true;
                        break;
                    }
                }
                if (!inserted) {
                    viewer.appendChild(container);
                }

                const renderTask = page.render({
                    canvasContext: ctx,
                    viewport: viewport
                });

                return renderTask.promise;
            });
        }

        function renderAllPages() {
            // 移除 loading
            if (loadingEl) loadingEl.style.display = 'none';

            // 清除已有页面
            viewer.querySelectorAll('.pdf-page').forEach(el => el.remove());

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                renderPage(i);
            }
            document.getElementById('page-total').textContent = `/ ${pdfDoc.numPages}`;
        }

        function loadPDF() {
            pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
                pdfDoc = pdf;
                renderAllPages();
            }).catch(err => {
                viewer.innerHTML = `<div class="error-msg">
                    <p style="font-size: 24px; margin-bottom: 12px;">⚠️</p>
                    <p>文档加载失败，请尝试 <a href="${pdfUrl}" target="_blank" style="color:#1e40af;">直接下载 PDF</a> 查看。</p>
                    <p style="font-size: 12px; margin-top: 8px; color: #9ca3af;">${err.message}</p>
                </div>`;
            });
        }

        // 跳转到指定页
        function goToPage(num) {
            if (!pdfDoc) return;
            num = Math.max(1, Math.min(num, pdfDoc.numPages));
            currentPage = num;
            document.getElementById('page-input').value = num;

            const target = document.querySelector(`.pdf-page[data-page="${num}"]`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 缩放
        function setZoom(scale) {
            zoomScale = Math.max(0.5, Math.min(2.0, scale));
            document.getElementById('zoom-level').textContent = Math.round(zoomScale * 100) + '%';
            if (pdfDoc) {
                renderAllPages();
            }
        }

        // DOM 事件
        document.addEventListener('DOMContentLoaded', () => {
            loadPDF();

            document.getElementById('go-page-btn').addEventListener('click', () => {
                const val = parseInt(document.getElementById('page-input').value);
                goToPage(val);
            });

            document.getElementById('page-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const val = parseInt(e.target.value);
                    goToPage(val);
                }
            });

            document.getElementById('zoom-in').addEventListener('click', () => setZoom(zoomScale + 0.1));
            document.getElementById('zoom-out').addEventListener('click', () => setZoom(zoomScale - 0.1));
        });
    </script>

</body>

</html>
