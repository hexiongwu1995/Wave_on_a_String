<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琴弦振动可视化</title>
    <style>
        body {
            font-family: KaiTi, system-ui, sans-serif;
            margin: 20px 10px;
            padding: 0px;
            background:white;
            color: black;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 20px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 10px rgba(0, 0, 0, 0.075);
            overflow: hidden;
        }
        header {
            background: #3177e7;
            color: white;
            margin:0px;
            padding: 20px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .subtitle {
            margin: 8px;
            font-size: 16px;
        }
        .content {
            margin:10px;
            padding: 0px;
            font-size:14px;
            color:black;
            text-align:left;
        }
        .info {
            margin-top: 20px;
            padding: 16px 20px;
            background: #f1f2f59b;
            border-radius: 10px;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 10px 10px #cbd5e1;
            font-size:16px;
            line-height: 1.6;
        }
        .math-equation{
            font-size:14px;
            text-align:center;
        }
        canvas {
            margin-top:10px;
            border: 3px solid #cbd5e1;
            border-radius: 16px;
            background: #f1f2f59b;
            image-rendering: crisp-edges;
            width: 100%;
            max-width: 100%;
            box-shadow: 0 10px 10px #cbd5e1;
            display: block;
        }
        .controls {
            background: #f1f2f59b;
            margin: 20px 0px;
            padding: 10px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 10px #cbd5e1;
        }
        .slider-group {
            display: flex;
            align-items: center;
            margin: 20px 5px;
            padding: 0px;
            flex-wrap: nowrap;
            gap: 10px;
            justify-content:space-evenly;
            width:100%;
        }
        label {
            display: inline-block;
            width: 120px;
            font-weight: 500;
            font-size: 12px;
            text-align: left;
        }
        input[type="range"] {
            flex: 1;
            accent-color: #3b82f6;
        }
        .value {
            display: inline-block;
            width: 60px;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            background: white;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            text-align: left;
            box-shadow: inset 0 5px 5px #e5e7eb;
        }
        .button-group {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
        }
        button {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #playBtn {
            background: #1e40af;
            color: white;
        }
        #playBtn:hover {
            transform: translateY(-2px);
        }
        #resetBtn {
            background: #64748b;
            color: white;
        }
        #resetBtn:hover {
            transform: translateY(-2px);
        }

        .time-display {
            font-size: 12px;
            font-weight: 500;
            color: #1e40af;
            background: white;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }
        /* .intro {
            padding: 32px;
        } */
    </style>

    <!-- ✅ 修复1：用 script 标签加载，加 id="typst" 监听 load 事件 -->
    <script type="module"
        src="https://cdn.jsdelivr.net/npm/@myriaddreamin/typst.ts/dist/esm/contrib/all-in-one-lite.bundle.js"
        id="typst">
    </script>

</head>

<body>

    <div class="container">
        <header>
            <h1>琴弦振动可视化</h1>
            <p class="subtitle">基于波动方程的弦振动实时模拟</p>
        </header>

        <div class="content">
            <div class="info">
            <p>我已经解得琴弦的振动方程y(x,t)。现在需要在这个html文档中使用Javascript对振动方程y(x,t)进行可视化。创建一个带参数滑块的动画，用来模拟琴弦的振动。</p>
            <p>满足所有边界条件和初始条件（初始三角波）的琴弦振动方程y(x,t)为:</p>
             <!-- ✅ 修复3：div 先于 script，确保 DOM 已存在 -->
            <div id="Wave-equation" class="math-equation">出错…</div>

            <p>张力的竖直分量为T_y(x,t)为：</p>
            <div id="Tension_Y_component" class="math-equation">出错…</div>
            <p>相关的中间参数计算公式为：</p>
            <div id="Intermediate-parameters" class="math-equation">出错…</div>
            </div>
            <br>
            <div style="margin-bottom: 20px; text-align: center;">
                <canvas id="canvas" width="820" height="320"></canvas>
            </div>

            <div class="controls">
                <div class="slider-group">
                    <label>A₀ (振幅, m):</label>
                    <input type="range" id="A0" min="0.005" max="0.02" step="0.0005" value="0.01">
                    <span class="value" id="A0_val">0.0100</span>
                </div>
                
                <div class="slider-group">
                    <label>L₀ (弦长, m):</label>
                    <input type="range" id="L0" min="0.2" max="1.0" step="0.01" value="0.6">
                    <span class="value" id="L0_val">0.60</span>
                </div>
                
                <div class="slider-group">
                    <label>x₀ / L₀ (拨弦位置):</label>
                    <input type="range" id="xrel" min="0.1" max="0.9" step="0.01" value="0.3">
                    <span class="value" id="xrel_val">0.30</span>
                </div>
                
                <div class="slider-group">
                    <label>T₀ (张力, N):</label>
                    <input type="range" id="T0" min="70" max="100" step="1" value="80">
                    <span class="value" id="T0_val">80</span>
                </div>
                
                <div class="slider-group">
                    <label>μ₀ (线密度, kg/m):</label>
                    <input type="range" id="mu0" min="0.004" max="0.012" step="0.0001" value="0.01">
                    <span class="value" id="mu0_val">0.0100</span>
                </div>
                
                <div class="slider-group">
                    <label>N (截断项数):</label>
                    <input type="range" id="N" min="1" max="50" step="1" value="12">
                    <span class="value" id="N_val">12</span>
                </div>
                
                <div class="slider-group">
                    <label>动画速度:</label>
                    <input type="range" id="s" min="0.000001" max="0.001" step="0.000001" value="0.00001">
                    <span class="value" id="s_val">1.0e-5</span>
                </div>

                <div class="button-group">
                    <button id="playBtn">暂停</button>
                    <button id="resetBtn">重置时间</button>
                    <span class="time-display" id="timeDisplay">t = 0.0000 s</span>
                </div>
            </div>

        </div>
    </div>



    <script>
        // ==================== 参数 ====================
        let A0 = 0.01;
        let L0 = 0.6;
        let xrel = 0.3;
        let T0 = 80;
        let mu0 = 0.01;
        let N_terms = 12;
        let speed = 1e-5;

        let t = 0;
        let isPlaying = true;
        let lastTime = Date.now();

        // ==================== DOM 元素 ====================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const sliders = {
            A0: document.getElementById('A0'),
            L0: document.getElementById('L0'),
            xrel: document.getElementById('xrel'),
            T0: document.getElementById('T0'),
            mu0: document.getElementById('mu0'),
            N: document.getElementById('N'),
            s: document.getElementById('s')
        };

        const values = {
            A0: document.getElementById('A0_val'),
            L0: document.getElementById('L0_val'),
            xrel: document.getElementById('xrel_val'),
            T0: document.getElementById('T0_val'),
            mu0: document.getElementById('mu0_val'),
            N: document.getElementById('N_val'),
            s: document.getElementById('s_val')
        };

        // ==================== 更新显示 ====================
        function updateSliderDisplays() {
            values.A0.textContent = A0.toFixed(4);
            values.L0.textContent = L0.toFixed(2);
            values.xrel.textContent = xrel.toFixed(2);
            values.T0.textContent = T0.toFixed(0);
            values.mu0.textContent = mu0.toFixed(4);
            values.N.textContent = N_terms;
            values.s.textContent = speed.toExponential(1);
        }

        // ==================== 计算函数 ====================
        function computeCoefficients() {
            const x0 = xrel * L0;
            const bn = new Array(N_terms);
            const denom = x0 * (L0 - x0) * Math.PI * Math.PI;
            
            for (let n = 1; n <= N_terms; n++) {
                bn[n-1] = (2 * A0 * L0 * L0 / (denom * n * n)) * Math.sin(n * Math.PI * x0 / L0);
            }
            return bn;
        }

        function wave(x, t, bn) {
            let y = 0;
            const V = Math.sqrt(T0 / mu0);
            
            for (let n = 1; n <= N_terms; n++) {
                const kn = n * Math.PI / L0;
                const wn = V * kn;
                y += bn[n-1] * Math.sin(kn * x) * Math.cos(wn * t);
            }
            return y;
        }

        // ==================== 绘图 ====================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const paddingLeft = 50;
            const paddingRight = 40;
            const paddingTop = 40;
            const plotWidth = canvas.width - paddingLeft - paddingRight;
            const plotHeight = canvas.height - paddingTop * 2;
            
            const bn = computeCoefficients();
            
            // 绘制琴弦
            ctx.beginPath();
            ctx.strokeStyle = '#1e40af';
            ctx.lineWidth = 4.5;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            
            const steps = 280;
            for (let i = 0; i <= steps; i++) {
                const x_phys = (i / steps) * L0;
                const y_phys = wave(x_phys, t, bn);
                
                const px = paddingLeft + (x_phys / L0) * plotWidth;
                const py = canvas.height / 2 - (y_phys / (A0 * 2.2)) * (plotHeight / 2);
                
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // 中心参考线
            ctx.beginPath();
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 3]);
            ctx.moveTo(paddingLeft, canvas.height / 2);
            ctx.lineTo(canvas.width - paddingRight, canvas.height / 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // 时间显示
            document.getElementById('timeDisplay').textContent = `t = ${t.toFixed(4)} s`;
        }

        // ==================== 动画循环 ====================
        function animate() {
            if (isPlaying) {
                const now = Date.now();
                const delta = (now - lastTime) / 1000;
                lastTime = now;
                t += speed * delta * 950;
            }
            
            draw();
            requestAnimationFrame(animate);
        }

        // ==================== 事件绑定 ====================
        function bindSliders() {
            Object.keys(sliders).forEach(key => {
                sliders[key].addEventListener('input', () => {
                    if (key === 'A0') A0 = parseFloat(sliders.A0.value);
                    if (key === 'L0') L0 = parseFloat(sliders.L0.value);
                    if (key === 'xrel') xrel = parseFloat(sliders.xrel.value);
                    if (key === 'T0') T0 = parseFloat(sliders.T0.value);
                    if (key === 'mu0') mu0 = parseFloat(sliders.mu0.value);
                    if (key === 'N') N_terms = parseInt(sliders.N.value);
                    if (key === 's') speed = parseFloat(sliders.s.value);
                    
                    updateSliderDisplays();
                });
            });
        }

        // ==================== 按钮事件 ====================
        document.getElementById('playBtn').addEventListener('click', () => {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').textContent = isPlaying ? '暂停' : '播放';
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            t = 0;
        });

        // ==================== 初始化 ====================
        function init() {
            updateSliderDisplays();
            bindSliders();
            draw();
            animate();
        }

        window.onload = init;
    </script>

    <script>
        // 😍 Typst 内容区
        // ✅ 修复2：监听 load 事件，配置 WASM 路径后再调用 $typst.svg()
        document.getElementById('typst').addEventListener('load', function () {
            $typst.setCompilerInitOptions({
                getModule: () =>
                    'https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-web-compiler/pkg/typst_ts_web_compiler_bg.wasm'
            });
            $typst.setRendererInitOptions({
                getModule: () =>
                    'https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-renderer/pkg/typst_ts_renderer_bg.wasm'
            });

            $typst.svg({
                mainContent: `#set page(width: auto, height: auto, margin: 0pt) 
                #set text(size:16pt)
                $ y(x,t) & = X(x) T(t) #linebreak() & = underbrace(sum_(n=1)^(infinity) (b_n sin(k_n x) cos(omega_n t)), "Standing Wave") #linebreak() &= 1/2 sum_(n=1)^(infinity) (b_n ( underbrace(sin(k_n x + omega_n t), "Left-traveling wave") + underbrace(sin(k_n x - omega_n t), "Right-traveling wave") ) ) $ `
            }).then(svg => {
                document.getElementById('Wave-equation').innerHTML = svg;
            }).catch(err => {
                document.getElementById('Wave-equation').textContent = '渲染失败：' + err;
            });

            $typst.svg({
                mainContent: `#set page(width: auto, height: auto, margin: 0pt) 
                #set text(size:16pt)
                $ T_y (x,t) = - T_0/2 dot sum_(n=1)^(infinity) lr({ b_n k_n lr([ cos(k_n x + omega_n t) + cos(k_n x - omega_n t) ], size: #200%) }, size: #150%) $`
            }).then(svg => {
                document.getElementById('Tension_Y_component').innerHTML = svg;
            }).catch(err => {
                document.getElementById('Tension_Y_component').textContent = '渲染失败：' + err;
            });

            $typst.svg({
                mainContent: `#set page(width: auto, height: auto, margin: 0pt) 
                #set text(size:16pt)
                $display(k_n = (n pi)/L_0)$  #h(2cm)  $display(omega_n = sqrt(T_0/mu_0) dot k_n)$ #h(2cm)  $display(b_n = (2 A_0 L_0^2)/(x_0(L_0 - x_0) pi^2 n^2) sin((n pi x_0)/L_0))$`
            }).then(svg => {
                document.getElementById('Intermediate-parameters').innerHTML = svg;
            }).catch(err => {
                document.getElementById('Intermediate-parameters').textContent = '渲染失败：' + err;
            });

            //  $k_n = (n pi)/L_0$  #h(2cm)  $omega_n = sqrt(T_0/mu_0) dot k_n$ #h(2cm)  $b_n = (2 A_0 L_0^2)/(x_0(L_0 - x_0) pi^2 n^2) sin((n pi x_0)/L_0)$
        });
    </script>

</body>
</html>
